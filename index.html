<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabledance Bar Bad Goisern</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #111;
      color: #fff;
    }
    header {
      background: #222;
      padding: 20px;
      text-align: center;
    }
    h1 {
      margin: 0;
      color: #f5a623;
    }
    .header-image {
      margin-top: 20px;
      max-width: 90%;
      height: auto;
      border-radius: 10px;
    }
    .container {
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    .progress {
      background: #333;
      border-radius: 10px;
      overflow: hidden;
      margin: 20px 0;
    }
    .progress-bar {
      height: 20px;
      background: #f5a623;
      width: 0%;
    }
    .card {
      background: #1e1e1e;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
      border: none;
    }
    button {
      background: #f5a623;
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background: #ffbf47;
    }
  </style>
</head>
<body>

<header>
  <h1>💃 Neue Tabledance Bar in Bad Goisern</h1>
  <img src="stoegners.png" alt="Stögner's Tabledancebar" class="header-image">
</header>

<div class="container">

  <div class="card">
    <h2>Unser Ziel</h2>
    <p>Wir eröffnen eine einzigartige Tabledance Bar – und DU kannst Teil davon werden! Unterstütze uns und investiere in ein neues Szene-Lokal.</p>
    <p><strong>Zielbetrag:</strong> 110.000€</p>
    <p><strong>Aktuell:</strong> <span id="currentAmount">0</span>€</p>

    <div class="progress">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>

  <div class="card">
    <h2>Investieren</h2>
    <input type="number" id="amount" placeholder="Betrag in €">
    <button onclick="invest()">Jetzt investieren</button>
  </div>

</div>

<script>
  let currentAmount = 0;
  const goal = 50000;

  function invest() {
    const input = document.getElementById('amount');
    const value = parseFloat(input.value);

    if (!value || value <= 0) {
      alert('Bitte gültigen Betrag eingeben');
      return;
    }

    currentAmount += value;
    document.getElementById('currentAmount').innerText = currentAmount;

    const percent = Math.min((currentAmount / goal) * 100, 100);
    document.getElementById('progressBar').style.width = percent + '%';

    input.value = '';

    alert('Danke für deine Investition! 🍸');
  }
</script>

</body>
</html>
